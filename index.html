<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/script.js" defer></script>
  </head>
  
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <h1>Library</h1>
        </div>
        <div class="btn-container">
          <button class="new-book-btn">+ New Book</button>
        </div>
      </div>
      <div class="main">
        <div class="book-cards"></div>
      </div>
    </div>
    <dialog class="new-book-modal">
      <div class="modal-header">
        <h2>Add New Book</h2>
        <button class="close-modal">&times;</button>
      </div>
      <form method="dialog" class="new-book-form">
        <div class="form-group">
          <label for="title">Title:</label>
          <input type="text" id="title" name="book-title" autofocus required>
        </div>
        <div class="form-group">
          <label for="author">Author:</label>
          <input type="text" id="author" name="book-author" required>
        </div>
        <div class="form-group">
          <label for="pages">Pages:</label>
          <input type="number" id="pages" name="page-count" required>
        </div>
        <div class="form-group checkbox-container">
          <label for="read">
            <input type="checkbox" id="read" name="read-status" value="read">
            Book Read?
          </label>
        </div>
        <div class="form-btn">
          <button type="submit">Add Book</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
